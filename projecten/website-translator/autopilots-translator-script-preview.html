<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Translator Script Preview</title>
  <style>
    html,
    body {
      margin: 0;
      overflow-x: hidden;
      scrollbar-width: none;
      
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    body {
      margin: 0;
      background: #f7f7f3;
      color: #101010;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    main {
      width: min(900px, calc(100% - 36px));
      margin: 0 auto;
      padding: 86px 0;
    }
    p.kicker {
      color: #a43a2a;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(42px, 6vw, 76px);
      line-height: .98;
    }
    p {
      max-width: 680px;
      color: #676767;
      font-size: 18px;
      line-height: 1.65;
      font-weight: 600;
    }
  /* ap-no-sticky-footer-scroll-2026-06 */
html,
body {
  height: auto !important;
  min-height: 0 !important;
  overflow-y: visible !important;
  overscroll-behavior-y: auto !important;
}

body {
  position: static !important;
}

.ap-language-card,
.ap-aside {
  position: static !important;
  top: auto !important;
}

.ap-no-inner-page-scroll {
  overflow-y: visible !important;
}

</style>
</head>
<body>
  <main>
    <p class="kicker">AUTOPILOTS</p>
    <h1>AI medewerkers voor klantenservice, sales en receptie.</h1>
    <p>Deze pagina is een korte test om te zien hoe de Autopilots vertaler op een gewone websitepagina verschijnt.</p>
  </main>
  <script src="./autopilots-translator-widget.js"></script>
</body>
</html>
