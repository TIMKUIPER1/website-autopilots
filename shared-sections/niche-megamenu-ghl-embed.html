<style>html,body{margin:0;overflow-x:hidden;scrollbar-width:none;scroll-behavior:smooth}html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0}

  #ap-niche-menu-content {
    --ap-bg: #f5f5f2;
    --ap-card: #ffffff;
    --ap-soft: #f8f8f5;
    --ap-text: #111111;
    --ap-muted: #656565;
    --ap-line: rgba(0, 0, 0, 0.1);
    --ap-brown: #9f3826;
    --ap-black: #111111;
    width: 100%;
    color: var(--ap-text);
    font-family: "Public Sans", Arial, sans-serif;
  }

  #ap-niche-menu-content,
  #ap-niche-menu-content * {
    box-sizing: border-box;
  }

  #ap-niche-menu-content a {
    color: inherit;
    text-decoration: none;
  }

  #ap-niche-menu-content .ap-niche-menu-inner {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 10px;
  }

  #ap-niche-menu-content .ap-niche-menu-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    column-gap: clamp(14px, 3vw, 30px);
    row-gap: 8px;
    align-items: start;
  }

  #ap-niche-menu-content .ap-niche-menu-link {
    min-height: 62px;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 18px;
    align-items: center;
    gap: 10px;
    border: 1px solid transparent;
    border-radius: 18px;
    padding: 10px 12px;
    transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease, color 160ms ease;
  }

  #ap-niche-menu-content .ap-niche-menu-link:hover,
  #ap-niche-menu-content .ap-niche-menu-link:focus-visible {
    background: var(--ap-soft);
    border-color: var(--ap-line);
    box-shadow: 0 12px 28px rgba(17, 17, 17, 0.07);
    color: var(--ap-brown);
    transform: translateY(-1px);
    outline: none;
  }

  #ap-niche-menu-content .ap-niche-menu-icon {
    width: 34px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ap-black);
    transition: color 160ms ease;
  }

  #ap-niche-menu-content .ap-niche-menu-link:hover .ap-niche-menu-icon,
  #ap-niche-menu-content .ap-niche-menu-link:focus-visible .ap-niche-menu-icon {
    color: var(--ap-brown);
  }

  #ap-niche-menu-content svg {
    display: block;
    width: 26px;
    height: 26px;
    stroke: currentColor;
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  #ap-niche-menu-content .ap-niche-menu-icon .ap-fill {
    fill: currentColor;
    stroke: none;
  }

  #ap-niche-menu-content .ap-niche-menu-title {
    display: block;
    font-size: clamp(15px, 1.16vw, 17px);
    line-height: 1.08;
    font-weight: 800;
    letter-spacing: 0;
    white-space: nowrap;
  }

  #ap-niche-menu-content .ap-niche-menu-title::after {
    content: attr(data-detail);
    display: block;
    max-width: 240px;
    margin-top: 4px;
    color: var(--ap-muted);
    font-size: 11px;
    line-height: 1.16;
    font-weight: 700;
    white-space: normal;
  }

  #ap-niche-menu-content .ap-niche-menu-link:hover .ap-niche-menu-title::after,
  #ap-niche-menu-content .ap-niche-menu-link:focus-visible .ap-niche-menu-title::after {
    color: var(--ap-text);
  }

  #ap-niche-menu-content .ap-niche-menu-arrow {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    color: var(--ap-brown);
    transform: translateX(-5px);
    transition: opacity 160ms ease, transform 160ms ease;
  }

  #ap-niche-menu-content .ap-niche-menu-arrow svg {
    width: 17px;
    height: 17px;
    stroke-width: 2.4;
  }

  #ap-niche-menu-content .ap-niche-menu-link:hover .ap-niche-menu-arrow,
  #ap-niche-menu-content .ap-niche-menu-link:focus-visible .ap-niche-menu-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  @media (max-width: 900px) {
    #ap-niche-menu-content .ap-niche-menu-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 24px;
    }
  }

  @media (max-width: 620px) {
    #ap-niche-menu-content .ap-niche-menu-inner {
      padding: 10px;
    }

    #ap-niche-menu-content .ap-niche-menu-grid {
      grid-template-columns: 1fr;
      row-gap: 4px;
    }

    #ap-niche-menu-content .ap-niche-menu-link {
      min-height: 58px;
      grid-template-columns: 30px minmax(0, 1fr) 18px;
      gap: 10px;
      padding: 9px 10px;
    }

    #ap-niche-menu-content .ap-niche-menu-title {
      font-size: 15px;
      white-space: normal;
    }
  }
</style>
