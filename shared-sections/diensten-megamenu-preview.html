<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autopilots diensten megamenu preview</title>
  <style>
    html,
    body {
      margin: 0;
      overflow-x: hidden;
      scrollbar-width: none;
      
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #f5f5f2;
      padding: 36px 0;
    }
  /* ap-no-sticky-footer-scroll-2026-06 */
html,
body {
  height: auto !important;
  min-height: 0 !important;
  overflow-y: visible !important;
  overscroll-behavior-y: auto !important;
}

body {
  position: static !important;
}

.ap-language-card,
.ap-aside {
  position: static !important;
  top: auto !important;
}

.ap-no-inner-page-scroll {
  overflow-y: visible !important;
}

</style>
</head>
<body>
  <div style="max-width:1180px;margin:0 auto;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:30px;box-shadow:0 20px 60px rgba(17,17,17,.12);padding:22px;">
    <iframe
      title="Diensten megamenu inhoud"
      src="diensten-megamenu-ghl-embed.html"
      style="width:100%;height:430px;border:0;display:block;"
    ></iframe>
  </div>

<script>
(function () {
  var marker = "ap-embed-height-sync-2026-06-10";
  if (window[marker]) return;
  window[marker] = true;

  function getHeight() {
    var doc = document.documentElement;
    var body = document.body;
    var heights = [
      doc ? doc.scrollHeight : 0,
      body ? body.scrollHeight : 0,
      doc ? doc.offsetHeight : 0,
      body ? body.offsetHeight : 0,
      doc ? doc.clientHeight : 0
    ];
    return Math.max.apply(Math, heights) + 24;
  }

  function syncHeight() {
    if (!window.parent || window.parent === window) return;
    window.parent.postMessage({
      type: "autopilots:embed-height",
      height: getHeight(),
      path: window.location.pathname
    }, "*");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", syncHeight);
  } else {
    syncHeight();
  }

  window.addEventListener("load", syncHeight);
  window.addEventListener("resize", syncHeight);
  setTimeout(syncHeight, 250);
  setTimeout(syncHeight, 1000);
  setTimeout(syncHeight, 2500);

  if ("ResizeObserver" in window && document.body) {
    new ResizeObserver(syncHeight).observe(document.body);
  }

  if ("MutationObserver" in window) {
    new MutationObserver(syncHeight).observe(document.documentElement, {
      childList: true,
      subtree: true,
      attributes: true
    });
  }
})();
</script>

</body>
</html>
